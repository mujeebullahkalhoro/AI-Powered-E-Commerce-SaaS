# Local dev MongoDB config (single-node replica set for transactions).
# Use with: mongod --config backend/scripts/mongod-replica.cfg

storage:
  dbPath: ../data/db

systemLog:
  destination: file
  logAppend: true
  path: ../data/mongod.log

net:
  port: 27018
  bindIp: 127.0.0.1

replication:
  replSetName: rs0
